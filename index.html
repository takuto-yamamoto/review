<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#F2F2F7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- iPhone safe-area: viewport-fit=cover + black-translucent is for PWA standalone only.
     In Safari browser the status bar sits outside the webview, so safe-area-inset-top
     already equals 0; no extra padding needed. We detect standalone and add a class. -->
<meta name="apple-mobile-web-app-title" content="復習マネ">
<title>復習マネージャー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=M+PLUS+Rounded+1c:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
:root{
  --bg:#F0F2F8;--card:#fff;
  --blue:#2563EB;--blue-d:#1D4ED8;--blue-bg:#EFF6FF;--blue-bd:rgba(37,99,235,.18);
  --red:#FF3B30;--green:#34C759;
  --lbl:#0A0A0F;--lbl2:rgba(60,60,67,.55);--lbl3:rgba(60,60,67,.28);
  --sep:rgba(60,60,67,.1);--fill:rgba(118,118,128,.1);
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --shadow-sm:0 1px 3px rgba(0,0,0,.07);
  --tab-h:49px;--r:16px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
}

/* ══ Reset / Base ══════════════════════ */
html{
  height:100%;
  /* Launch flash prevention: same as --bg */
  background:#F2F2F7;
}
body{
  /* -webkit-fill-available: more reliable than 100% in iOS PWA standalone */
  height:100%;
  min-height:-webkit-fill-available;
  overflow:hidden;
  background:var(--bg);
  /* Prevent iOS rubber-band overscroll on body */
  overscroll-behavior:none;
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;
  color:var(--lbl);-webkit-font-smoothing:antialiased;
}

/* ══ App shell ═════════════════════════ */
#app{
  position:fixed;
  top:0;left:0;right:0;
  bottom:0;
  /* In PWA, extend to include home indicator area */
  inset:0;
  display:flex;flex-direction:column;overflow:hidden;
  -webkit-transform:translateZ(0);
  transform:translateZ(0);
}
body.pwa #app{
  /* Extend app shell down by safe-bottom so tab-bar::after fills home indicator */
  bottom:calc(-1 * var(--safe-bottom));
}

/* ══ Navbar ════════════════════════════ */
.navbar{
  background:rgba(242,242,247,.98);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  backdrop-filter:saturate(180%) blur(20px);
  border-bottom:.5px solid var(--sep);
  /* Safe-area top padding: only in PWA standalone (body.pwa).
     In Safari browser the status bar is outside the webview, so
     env(safe-area-inset-top) returns 0 in Safari but ~47px in standalone. */
  padding-top:0;
  flex-shrink:0;z-index:50;
  transform:translateZ(0);
}
body.pwa .navbar{
  padding-top:var(--safe-top);
}
.nav-inner{padding:10px 20px 10px}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.nav-title{
  font-family:'M PLUS Rounded 1c','Outfit',sans-serif;font-size:22px;font-weight:900;
  color:var(--blue);letter-spacing:-.3px;line-height:1
}
.nav-date{font-size:13px;color:var(--lbl2);font-variant-numeric:tabular-nums;letter-spacing:.2px}
.stat-row{display:flex;gap:6px;flex-wrap:wrap;min-height:26px;align-items:center}
.chip{
  background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:100px;
  padding:4px 10px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;
  color:var(--blue-d);display:flex;align-items:center;gap:4px
}
.chip.warn{background:#FEF2F2;border-color:rgba(255,59,48,.2);color:#B91C1C}

/* ══ Panels ════════════════════════════ */
.panels{flex:1;overflow:hidden;position:relative;min-height:0}

/* B6 fix: start panels as display:none with no transform (no mid-frame flash) */
.panel{
  position:absolute;inset:0;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  overscroll-behavior-y:none; /* Prevent panel from triggering body bounce */
  display:none;
  /* Ensure panels don't bleed behind blur layers */
  will-change:scroll-position;
  padding:12px calc(16px + var(--safe-right)) calc(24px + var(--safe-bottom)) calc(16px + var(--safe-left));
}
/* Animation applied via separate classes only when transitioning */
.panel.slide-in{
  display:block;
  animation:panelIn .22s cubic-bezier(.25,.46,.45,.94) both
}
.panel.slide-back{
  display:block;
  animation:panelBack .22s cubic-bezier(.25,.46,.45,.94) both
}
/* Visible-at-rest state (no animation) */
.panel.visible{display:block}

@keyframes panelIn{
  from{opacity:0;transform:translateX(22px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes panelBack{
  from{opacity:0;transform:translateX(-22px)}
  to{opacity:1;transform:translateX(0)}
}

/* ══ Touch: remove 300ms tap delay on all interactive elements ══ */
button,a,input,[role="button"]{touch-action:manipulation}

/* ══ Section label ═════════════════════ */
.sec{
  font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:rgba(60,60,67,.38);padding:0 4px;margin:20px 0 8px
}
.sec.sec-first{margin-top:2px}

/* ══ Hero card ═════════════════════════ */
.hero{
  background:linear-gradient(135deg,#1a3faa 0%,#2563EB 50%,#3B82F6 100%);
  border-radius:var(--r);padding:20px 20px 20px;margin-bottom:12px;
  position:relative;overflow:hidden;
  box-shadow:0 4px 20px rgba(37,99,235,.3)
}
.hero::before,.hero::after{content:'';position:absolute;border-radius:50%;pointer-events:none}
.hero::before{width:200px;height:200px;top:-70px;right:-60px;background:rgba(255,255,255,.08)}
.hero::after{width:120px;height:120px;bottom:-40px;left:10px;background:rgba(255,255,255,.05)}
.hero-msg{font-size:20px;font-weight:700;color:#fff;position:relative;z-index:1;line-height:1.25}
.hero-sub{font-size:13px;color:rgba(255,255,255,.7);margin-top:5px;position:relative;z-index:1;line-height:1.5}

/* ══ Card wrap (swipe container) ══════ */
.cw{
  position:relative;border-radius:var(--r);margin-bottom:10px;
  overflow:hidden;isolation:isolate;
}
/* B3 fix: only animate cards marked as new, not on every render */
.cw.new-card{animation:fadeInUp .2s ease both}
@keyframes fadeInUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.swipe-bg{
  position:absolute;right:0;top:0;bottom:0;width:80px;
  background:var(--red);z-index:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer
}
.swipe-bg-lbl{color:#fff;font-size:11px;font-weight:600;pointer-events:none}

/* ══ Card ══════════════════════════════ */
.card{
  background:var(--card);border-radius:var(--r);padding:15px 16px;
  position:relative;z-index:1;
  will-change:transform;
  transition:transform .22s cubic-bezier(.25,.46,.45,.94);
  box-shadow:var(--shadow)
}
.card.over{border-left:3px solid var(--red);padding-left:13px}
.card.due{border-left:3px solid var(--blue);padding-left:13px}
@keyframes flashGreen{
  0%{background:#fff}
  25%{background:#D1FAE5}
  70%{background:#D1FAE5}
  100%{background:#fff}
}
.card.flash{animation:flashGreen .4s ease}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:5px}
.card-name{
  font-size:16px;font-weight:700;color:var(--lbl);line-height:1.35;flex:1;
  word-break:break-word;overflow-wrap:break-word;letter-spacing:-.1px
}
.card-when{
  font-size:13px;color:var(--lbl2);margin-bottom:9px;
  display:flex;align-items:center;gap:5px;flex-wrap:wrap;letter-spacing:.1px
}
.card-when.over{color:var(--red);font-weight:600}
.card-when.due{color:var(--blue);font-weight:600}


/* U1 fix: 44px minimum touch target for buttons */
.acts{display:flex;gap:8px}
.btn-ok{
  flex:1;background:var(--blue);color:#fff;border:none;border-radius:12px;
  padding:13px 12px;min-height:46px;
  font-size:15px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:opacity .12s,transform .1s;font-family:inherit;
  box-shadow:0 2px 10px rgba(37,99,235,.3),0 1px 3px rgba(37,99,235,.2);
  letter-spacing:.1px
}
.btn-ok:active{opacity:.78;transform:scale(.97)}
.btn-ok:disabled{opacity:.45;pointer-events:none}
.btn-snooze{
  background:var(--fill);color:var(--lbl2);border:none;border-radius:12px;
  padding:13px 14px;min-height:46px;
  font-size:13px;font-weight:500;cursor:pointer;
  white-space:nowrap;display:flex;align-items:center;gap:6px;
  transition:opacity .12s,background .12s;font-family:inherit
}
.btn-snooze:active{opacity:.6;background:var(--sep)}

/* ══ Done card ═════════════════════════ */
.done-row{
  background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;
  display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow-sm)
}
.done-icon{width:36px;height:36px;border-radius:50%;background:#D1FAE5;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.done-txt{flex:1;min-width:0}
.done-name{font-size:15px;font-weight:600;color:var(--lbl);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.done-meta{font-size:12px;color:var(--lbl2);margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
/* U1: 44pt touch target for delete button */
.done-del{
  background:none;border:none;cursor:pointer;
  min-width:44px;min-height:44px;color:var(--lbl3);
  display:flex;align-items:center;justify-content:center;
  transition:color .12s
}
.done-del:active{color:var(--red)}

/* ══ Weekday badge ═════════════════════ */
.dow{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  font-size:12px;font-weight:700;flex-shrink:0;
  font-family:'Outfit',-apple-system,sans-serif
}
.dow-sun{background:#FEE2E2;color:#DC2626}
.dow-sat{background:#DBEAFE;color:#1D4ED8}
.dow-wkd{background:rgba(118,118,128,.12);color:var(--lbl2)}

/* ══ Empty state ═══════════════════════ */
.empty{text-align:center;padding:48px 24px}
.empty-icon{width:64px;height:64px;border-radius:20px;background:var(--fill);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.empty h3{font-size:17px;font-weight:600;color:var(--lbl);margin-bottom:6px}
.empty p{font-size:14px;line-height:1.75;color:var(--lbl2)}

/* ══ Tab bar ═══════════════════════════ */
.tab-bar{
  background:rgba(252,252,255,.97);
  -webkit-backdrop-filter:saturate(200%) blur(24px);
  backdrop-filter:saturate(200%) blur(24px);
  border-top:.5px solid rgba(60,60,67,.1);
  display:flex;align-items:center;
  height:var(--tab-h);
  padding-left:var(--safe-left);
  padding-right:var(--safe-right);
  flex-shrink:0;z-index:50;
  position:relative;
  transform:translateZ(0);
}
/* Fill the home indicator zone below the tab bar with the same bg */
.tab-bar::after{
  content:'';
  position:absolute;
  left:0;right:0;top:100%;
  height:var(--safe-bottom);
  background:rgba(252,252,255,.97);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;cursor:pointer;color:var(--lbl3);
  /* U1: ensure 44pt min-height for entire tab tap area */
  min-height:44px;padding:4px 0;
  transition:color .15s;position:relative
}
.tab-lbl{font-size:10px;font-weight:600;letter-spacing:.1px;line-height:1}
.tab-btn.on{color:var(--blue)}
.tbadge{
  position:absolute;top:2px;left:calc(50% + 7px);
  background:var(--red);color:#fff;
  font-size:9px;font-weight:700;font-family:'Outfit',sans-serif;
  border-radius:100px;min-width:15px;height:15px;
  display:flex;align-items:center;justify-content:center;padding:0 3px
}
.tbadge.h{display:none}
.tab-fab{
  /* flex:1 to match tab-btn widths — ensures perfect 4-column equal spacing */
  flex:1;display:flex;align-items:center;justify-content:center;
  background:none;border:none;cursor:pointer;padding:0;min-height:44px
}
.fab-disc{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(145deg,#3B82F6,#1D4ED8);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(37,99,235,.45),0 1px 4px rgba(37,99,235,.3);
  transition:transform .12s,box-shadow .12s
}
.tab-fab:active .fab-disc{transform:scale(.88);box-shadow:0 2px 8px rgba(37,99,235,.25)}

/* ══ Search bar ════════════════════════ */
.search-wrap{
  position:sticky;top:0;z-index:10;
  padding:10px 0 8px;background:var(--bg)
}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:rgba(118,118,128,.12);border-radius:12px;padding:8px 12px
}
.search-inp{
  flex:1;background:none;border:none;outline:none;
  font-family:inherit;font-size:16px;color:var(--lbl);min-width:0
}
.search-inp::placeholder{color:var(--lbl3)}
.search-clear{
  background:rgba(118,118,128,.35);border:none;border-radius:50%;
  width:22px;height:22px;color:#fff;font-size:12px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  padding:0;flex-shrink:0
}
.search-cnt{font-size:12px;color:var(--lbl2);padding:0 4px;margin-top:5px}

/* ══ Overlay ═══════════════════════════ */
.overlay{
  position:fixed;inset:0;z-index:100;
  background:transparent;pointer-events:none;transition:background .28s
}
.overlay.on{background:rgba(0,0,0,.45);pointer-events:all}

/* ══ Bottom sheet ══════════════════════ */
.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:101;
  background:var(--card);border-radius:24px 24px 0 0;
  transform:translateY(110%);
  transition:transform .38s cubic-bezier(.32,.72,0,1);
  padding-bottom:var(--safe-bottom);
  padding-left:var(--safe-left);
  padding-right:var(--safe-right);
  display:flex;flex-direction:column;max-height:92vh;
  /* Ensure sheet renders above everything in PWA */
  -webkit-transform:translateY(110%);
}
.sheet.on{transform:translateY(0);-webkit-transform:translateY(0)}
.sheet-pull{width:40px;height:5px;background:var(--lbl3);border-radius:3px;margin:12px auto 4px;flex-shrink:0}
.sheet-body{
  padding:8px 20px 20px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  flex:1;min-height:0
}
.sheet-ttl{font-size:17px;font-weight:700;text-align:center;margin-bottom:18px}
.sheet-inp{
  width:100%;background:var(--fill);border:none;border-radius:12px;
  padding:14px 16px;font-family:inherit;font-size:17px;color:var(--lbl);
  outline:none;margin-bottom:12px;-webkit-appearance:none
}
.sheet-inp::placeholder{color:var(--lbl3)}
.sheet-inp.shake,.tag-add-inp.shake{animation:shake .35s ease}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}80%{transform:translateX(4px)}
}

/* ── Date selector ── */
.date-label{font-size:13px;font-weight:600;color:var(--lbl2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.seg{display:flex;background:var(--fill);border-radius:10px;padding:3px;gap:3px;margin-bottom:10px}
.seg-btn{
  flex:1;border:none;border-radius:8px;padding:9px 6px;
  font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;
  color:var(--lbl2);background:none;transition:all .18s;line-height:1.2;text-align:center
}
.seg-btn.on{background:#fff;color:var(--lbl);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.date-custom-wrap{
  overflow:hidden;max-height:0;opacity:0;
  transition:max-height .28s ease,opacity .22s ease;margin-bottom:0
}
.date-custom-wrap.open{max-height:60px;opacity:1;margin-bottom:10px}
.date-inp{
  width:100%;background:var(--fill);border:none;border-radius:12px;
  padding:12px 14px;font-family:inherit;font-size:16px;color:var(--lbl);
  outline:none;-webkit-appearance:none;appearance:none
}
.sheet-info{
  background:var(--blue-bg);border-radius:10px;padding:11px 14px;margin-bottom:16px;
  font-size:13px;color:var(--blue-d);line-height:1.75;display:flex;flex-direction:column;gap:4px
}
.sheet-info-row{display:flex;align-items:center;gap:8px}
.sheet-ok{
  width:100%;
  background:linear-gradient(145deg,#3B82F6,#1D4ED8);
  color:#fff;border:none;border-radius:14px;
  padding:16px;font-family:inherit;font-size:17px;font-weight:700;cursor:pointer;
  min-height:52px;transition:opacity .12s;
  box-shadow:0 3px 14px rgba(37,99,235,.35);letter-spacing:.1px
}
.sheet-ok:active{opacity:.8}

/* ══ Toast ═════════════════════════════ */
.toast{
  position:fixed;
  bottom:calc(var(--tab-h) + var(--safe-bottom) + 16px);left:50%;
  transform:translateX(-50%) translateY(16px);
  background:rgba(28,28,30,.92);
  -webkit-backdrop-filter:saturate(180%) blur(16px);backdrop-filter:saturate(180%) blur(16px);
  color:#fff;padding:10px 18px;border-radius:100px;
  font-size:14px;font-weight:500;z-index:999;
  opacity:0;transition:opacity .2s,transform .28s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;display:flex;align-items:center;gap:8px;
  max-width:calc(100vw - 32px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ Edit button on card ════════════════ */
.btn-edit{
  background:none;border:none;cursor:pointer;
  padding:4px 6px;color:var(--lbl3);
  display:flex;align-items:center;
  border-radius:6px;transition:background .12s,color .12s;
  flex-shrink:0;margin-top:1px;
}
.btn-edit:active{background:var(--fill);color:var(--blue)}

/* Fix7: stronger visual for due/over states */
.card.due .card-when{ color:var(--blue); }
.card.over .card-when{ color:var(--red); }
.card.due{ background:linear-gradient(100deg,#EFF6FF 0%,#fff 45%); }
.card.over{ background:linear-gradient(100deg,#FFF1F0 0%,#fff 45%); }

/* ══ Step dots ══════════════════════════ */
.step-dots{display:flex;align-items:center;gap:6px;margin-bottom:13px;flex-wrap:wrap}
.step-dot{
  width:8px;height:8px;border-radius:50%;background:rgba(118,118,128,.18);
  transition:background .25s,transform .15s;flex-shrink:0
}
.step-dot.done{background:var(--blue);opacity:.7}
.step-dot.active{
  background:var(--blue);transform:scale(1.3);opacity:1;
  box-shadow:0 0 0 3px rgba(37,99,235,.2)
}
.step-dot-lbl{font-size:12px;color:var(--lbl2);margin-left:3px;letter-spacing:.1px}
.step-dot-lbl.active{color:var(--blue);font-weight:600}

/* ══ Streak badge in navbar ═══════════════ */
.streak{
  display:flex;align-items:center;gap:4px;
  background:linear-gradient(135deg,#FEF3C7,#FDE68A);
  border:1px solid #F59E0B;border-radius:100px;
  padding:3px 10px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;color:#92400E
}

/* ══ All-done hero (special state) ════════ */
.hero.all-done{
  background:linear-gradient(135deg,#064E3B 0%,#059669 55%,#34D399 100%);
  box-shadow:0 4px 20px rgba(5,150,105,.3)
}

/* ══ Snooze picker pointer-events fix ════ */
.snooze-pick{
  position:fixed;inset:0;z-index:150;
  display:flex;align-items:flex-end;
  pointer-events:none;   /* fix7: block nothing when closed */
}
.snooze-pick.on{pointer-events:all}
.snooze-pick-bg{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .2s}
.snooze-pick.on .snooze-pick-bg{background:rgba(0,0,0,.35)}
.snooze-pick-box{
  position:relative;width:100%;background:var(--card);
  border-radius:20px 20px 0 0;
  padding:0 calc(16px + var(--safe-right)) calc(16px + var(--safe-bottom)) calc(16px + var(--safe-left));

/* ══════════════════════════════════════════
   CONSTANTS & DATA
══════════════════════════════════════════ */
// 復習スケジュール：1日後→7日後→14日後→28日後→60日後→90日後→120日後→180日後（約半年）
const STEPS = ['1回目','2回目','3回目','4回目','5回目','6回目','7回目','8回目'];
const INTS  = [1,7,14,28,60,90,120,180];
const MAX_STEP = STEPS.length; // 8
const KEY   = 'fukushu-v6';
const DOW   = '日月火水木金土';
const TABS  = { today:'今日のタスク', upcoming:'予定一覧', done:'実績' };

/* ══ Tag data ══════════════════════════ */
const TAG_KEY = 'fukushu-tags-v1';
const TAG_COLORS = [
  '#EF4444','#F97316','#EAB308','#22C55E','#14B8A6',
  '#3B82F6','#8B5CF6','#EC4899','#6B7280','#0EA5E9'
];
let TAGS = (() => { try { return JSON.parse(localStorage.getItem(TAG_KEY)) || []; } catch { return []; } })();
const saveTags = () => localStorage.setItem(TAG_KEY, JSON.stringify(TAGS));

function getTag(id){ return TAGS.find(t=>t.id===id); }
function tagHtml(tagId, small=false){
  const t=getTag(tagId); if(!t) return '';
  const bg=t.color+'22', fg=t.color;
  return `<span class="tag-chip" style="background:${bg};color:${fg}"><span class="tag-dot" style="background:${fg}"></span>${esc(t.name)}</span>`;
}

/* Tag manager state */
let _tagPickColor = TAG_COLORS[0];
let _tagEditingId = null; // id of tag whose color picker is open

function openTagMgr(){
  renderTagMgr();
  document.getElementById('tag-overlay').classList.add('on');
  document.getElementById('tag-mgr-sheet').classList.add('on');
  haptic();
}
function closeTagMgr(){
  document.getElementById('tag-overlay').classList.remove('on');
  document.getElementById('tag-mgr-sheet').classList.remove('on');
  _tagEditingId = null;
  renderSheetTagSel();
  renderEditTagSel();
  render();
}

function renderTagMgr(){
  // Color picker for new tag
  const cp = document.getElementById('tag-color-pick');
  cp.innerHTML = TAG_COLORS.map(c=>`
    <div class="color-swatch${c===_tagPickColor?' selected':''}"
      style="background:${c}"
      onclick="selectNewTagColor('${c}')"></div>`).join('');

  // Tag list
  const wrap = document.getElementById('tag-list-wrap');
  if(!TAGS.length){
    wrap.innerHTML=`<div style="text-align:center;padding:16px 0;color:var(--lbl3);font-size:14px">タグはまだありません</div>`;
    return;
  }
  wrap.innerHTML = TAGS.map(t=>`
    <div class="tag-list-item" id="tli-${t.id}">
      <div class="tag-list-color" style="background:${t.color}"
        onclick="openTagColorEdit('${t.id}')"></div>
      <input class="tag-list-name" value="${esc(t.name)}" maxlength="20"
        onchange="renameTag('${t.id}',this.value)"
        onblur="renameTag('${t.id}',this.value)">
      <button class="tag-list-del" onclick="deleteTag('${t.id}')">${IC.trash}</button>
    </div>
    ${_tagEditingId===t.id ? `<div class="color-pick-wrap" style="margin-bottom:8px">${
      TAG_COLORS.map(c=>`<div class="color-swatch${c===t.color?' selected':''}"
        style="background:${c}" onclick="setTagColor('${t.id}','${c}')"></div>`).join('')
    }</div>` : ''}`).join('');
}

function selectNewTagColor(c){
  _tagPickColor=c;
  renderTagMgr();
}
function openTagColorEdit(id){
  _tagEditingId = _tagEditingId===id ? null : id;
  renderTagMgr();
}
function setTagColor(id, color){
  const t=TAGS.find(x=>x.id===id); if(!t) return;
  t.color=color; saveTags();
  _tagEditingId=null;
  renderTagMgr();
}
function renameTag(id, val){
  const name=val.trim(); if(!name) return;
  const t=TAGS.find(x=>x.id===id); if(!t||t.name===name) return;
  t.name=name; saveTags();
}
function deleteTag(id){
  TAGS=TAGS.filter(t=>t.id!==id);
  // Remove tag from all units
  U.forEach(u=>{ if(u.tags) u.tags=u.tags.filter(tid=>tid!==id); });
  if(activeTagFilter===id) activeTagFilter=null; // reset stale filter
  save(); saveTags();
  renderTagMgr();
  haptic();
}
function addTag(){
  const inp=document.getElementById('tag-add-inp');
  const name=inp.value.trim(); if(!name) return;
  if(TAGS.some(t=>t.name===name)){ inp.classList.add('shake'); setTimeout(()=>inp.classList.remove('shake'),400); haptic('medium'); return; }
  const newTag={id:Date.now().toString(), name, color:_tagPickColor};
  TAGS.push(newTag); saveTags();
  inp.value='';
  _tagPickColor=TAG_COLORS[(TAGS.length) % TAG_COLORS.length];
  renderTagMgr();
  haptic('medium');
}

/* Tag selector for sheets */
let _sheetTags = []; // selected tag ids for the add sheet
let _editTags  = []; // selected tag ids for the edit sheet

function renderSheetTagSel(){
  const wrap=document.getElementById('sheet-tag-sel-wrap'); if(!wrap) return;
  if(!TAGS.length){ wrap.innerHTML=''; return; }
  wrap.innerHTML=`
    <div class="tag-sel-wrap">
      <div class="tag-sel-label">
        <span>タグ</span>
        <button class="tag-sel-open-mgr" onclick="openTagMgr()">タグを管理 →</button>
      </div>
      <div class="tag-sel-list">${TAGS.map(t=>{
        const on=_sheetTags.includes(t.id);
        return `<button class="tag-sel-btn${on?' on':''}"
          style="${on?`background:${t.color};border-color:${t.color}`:''}"
          onclick="toggleSheetTag('${t.id}')">
          <span class="tag-dot" style="background:${on?'#fff':t.color}"></span>${esc(t.name)}
        </button>`;
      }).join('')}</div>
    </div>`;
}

function toggleSheetTag(id){
  _sheetTags=_sheetTags.includes(id)?_sheetTags.filter(x=>x!==id):[..._sheetTags,id];
  renderSheetTagSel();
  haptic();
}

function renderEditTagSel(){
  const wrap=document.getElementById('edit-tag-sel-wrap'); if(!wrap) return;
  if(!TAGS.length){ wrap.innerHTML=''; return; }
  wrap.innerHTML=`
    <div class="tag-sel-wrap">
      <div class="tag-sel-label"><span>タグ</span></div>
      <div class="tag-sel-list">${TAGS.map(t=>{
        const on=_editTags.includes(t.id);
        return `<button class="tag-sel-btn${on?' on':''}"
          style="${on?`background:${t.color};border-color:${t.color}`:''}"

        </button>`;
      }).join('')}</div>
    </div>`;
}

function toggleEditTag(id){
  _editTags=_editTags.includes(id)?_editTags.filter(x=>x!==id):[..._editTags,id];
  renderEditTagSel();
  haptic();

/* Tag filter state */
let activeTagFilter = null; // null = all

// 旧バージョンからのデータ移行（v4→v6, v5→v6）
(()=>{ try {
  if(localStorage.getItem(KEY)) return; // v6データがあればスキップ
  const src = localStorage.getItem('fukushu-v5') || localStorage.getItem('fukushu-v4');
  if(src) localStorage.setItem(KEY, src);
} catch(_){} })();

let U = (() => { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } })();

const save  = () => localStorage.setItem(KEY, JSON.stringify(U));
// ローカル日時を使う（UTC基準だとJSTでは日付がズレる）
const td    = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const addD  = (s,n) => { const d=new Date(s+'T00:00:00'); d.setDate(d.getDate()+n); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };

// データ修復：step=0 の nextDate が addedDate と同日（学習当日）になっているものを翌日に修正
(()=>{
  let fixed=false;
  U.forEach(u=>{
    if(!u.done && u.step===0 && u.nextDate<=u.addedDate){
      u.nextDate=addD(u.addedDate,1); fixed=true;
    }
  });
  if(fixed) localStorage.setItem(KEY,JSON.stringify(U));
})();
const diff  = s => Math.round((new Date(s+'T00:00:00')-new Date(td()+'T00:00:00'))/86400000);
const haptic = (t='light') => { try { if(navigator.vibrate) navigator.vibrate(t==='medium'?8:t==='heavy'?[10,4,10]:4); } catch(_){} };
const esc   = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ══ Date helpers ══════════════════════ */
function dowClass(d){ return d===0?'dow-sun':d===6?'dow-sat':'dow-wkd'; }
function dowBadge(s){
  const d=new Date(s+'T00:00:00'), day=d.getDay();
  return `<span class="dow ${dowClass(day)}">${DOW[day]}</span>`;
}
function fmtShort(s){
  const d=new Date(s+'T00:00:00');
  return `${d.getMonth()+1}月${d.getDate()}日 ${dowBadge(s)}`;
}
function fmtShortText(s){
  const d=new Date(s+'T00:00:00');
  return `${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}）`;
}
function fmtFull(s){
  const d=new Date(s+'T00:00:00');
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${dowBadge(s)}`;
}

/* ══ Scroll position preservation ══════
   B2 fix: save/restore scroll per panel so render() doesn't jump to top
══════════════════════════════════════════ */
const _scroll = {today:0, upcoming:0, done:0};
function saveScroll(){
  ['today','upcoming','done'].forEach(id=>{
    const el=document.getElementById('p-'+id);
    // Fix2: use getComputedStyle so CSS-class-driven display:none is detected correctly
    if(el && getComputedStyle(el).display!=='none') _scroll[id]=el.scrollTop;
  });
}
function restoreScroll(){
  ['today','upcoming','done'].forEach(id=>{
    const el=document.getElementById('p-'+id);
    if(el) el.scrollTop=_scroll[id]||0;
  });
}

/* ══ Streak tracking ════════════════════
   Rules: completing ≥1 review on a calendar day counts.
   Streak = consecutive days ending today (or yesterday).
══════════════════════════════════════════ */
const STREAK_KEY = 'fukushu-streak-v1';

function loadStreak(){
  try { return JSON.parse(localStorage.getItem(STREAK_KEY)) || {count:0, lastDate:''}; }
  catch { return {count:0, lastDate:''}; }
}
function saveStreak(s){ localStorage.setItem(STREAK_KEY, JSON.stringify(s)); }

function bumpStreak(){
  const t = td(), s = loadStreak();
  if(s.lastDate === t) return s; // already bumped today
  const yesterday = addD(t, -1);
  if(s.lastDate === yesterday){
    s.count++; // extended
  } else if(s.lastDate < yesterday || !s.lastDate){
    s.count = 1; // broken or fresh
  }
  s.lastDate = t;
  saveStreak(s);
  return s;
}

function getStreak(){
  const s = loadStreak(), t = td();
  // Streak is live only if last activity was today or yesterday
  if(s.lastDate === t || s.lastDate === addD(t,-1)) return s.count;
  return 0;
}


const ADJ_DISMISSED_KEY = 'fukushu-adj-dismissed';
let adjDismissed = (() => { try { return localStorage.getItem(ADJ_DISMISSED_KEY) === '1'; } catch { return false; } })();
let searchQ = '';

/* ══ Sheet date state ══════════════════ */
let _sheetDateMode = 'today';

function getSheetDate(){
  if(_sheetDateMode==='yesterday') return addD(td(),-1);
  if(_sheetDateMode==='custom'){
    const v=document.getElementById('date-inp')?.value;
    if(v){
      if(v>td()) return td();
      if(v<addD(td(),-30)) return addD(td(),-30);
      return v;
    }
    return td();
  }
  return td();
}

function selectDateSeg(btn){
  document.querySelectorAll('#date-seg .seg-btn').forEach(b=>b.classList.toggle('on',b===btn));
  _sheetDateMode=btn.dataset.val;
  haptic();
  const wrap=document.getElementById('date-custom-wrap');
  if(_sheetDateMode==='custom'){
    wrap.classList.add('open');
    const di=document.getElementById('date-inp');
    if(!di.value) di.value=addD(td(),-1);
    di.max=td(); di.min=addD(td(),-30);
    setTimeout(()=>di.focus(),160);
  } else {
    wrap.classList.remove('open');
  }
  updateSheetInfo();
}

function updateSheetInfo(){
  if(!document.getElementById('sheet').classList.contains('on')) return;
  const date=getSheetDate(), first=addD(date,INTS[0]);
  document.getElementById('sheet-info').innerHTML=
    `<div class="sheet-info-row">${IC.calendar} 学習日：${fmtFull(date)}</div>
     <div class="sheet-info-row">${IC.clock} 1回目の復習：${fmtShortText(first)}</div>`;
}

function addUnit(){
  const inp=document.getElementById('inp');
  const name=inp.value.trim();
  if(!name){
    inp.classList.remove('shake');
    void inp.offsetWidth;
    inp.classList.add('shake');
    haptic('medium'); inp.focus(); return;
  }
  const learnDate=getSheetDate();
  // 1回目の復習は学習日の翌日。安全策：nextDate が learnDate 以前にはならないことを保証
  const rawNext=addD(learnDate,INTS[0]);
  const firstNext=rawNext>learnDate?rawNext:addD(learnDate,1);
  U.unshift({id:Date.now().toString(),name,addedDate:learnDate,step:0,nextDate:firstNext,done:false,isNew:true,tags:[..._sheetTags]});
  _sheetTags=[]; save(); inp.value=''; closeSheet();
  adjDismissed=false;
  try { localStorage.removeItem(ADJ_DISMISSED_KEY); } catch(_){}
  render();
  // B1 fix: esc(name) prevents XSS in toast innerHTML
  const suffix = learnDate!==td() ? `（${fmtShortText(learnDate)}）` : '';
  setTimeout(()=>toast(IC.checkCircle, esc(name)+'を追加'+suffix), 340);
  haptic('medium');
}

const _completing = new Set();

function complete(id){
  if(_completing.has(id)) return;
  _completing.add(id);
  // Safety: clear from set after 3s even if callbacks fail
  const _safetyTimer = setTimeout(()=>_completing.delete(id), 3000);
  const u=U.find(x=>x.id===id); if(!u){ _completing.delete(id); clearTimeout(_safetyTimer); return; }
  const card=document.getElementById('c-'+id);
  if(card) card.classList.add('flash');
  haptic('medium');
  u.step++;
  if(u.step>=MAX_STEP){
    u.done=true;
    u.completedAt = Date.now();
    bumpStreak();
    save();
    clearTimeout(_safetyTimer);
    shrinkOut('w-'+id,()=>{ render(); _completing.delete(id); });
    // P5: celebration for final completion
    setTimeout(()=>celebrate(u.name), 320);
    toast(IC.checkCircle, esc(u.name)+'の全復習が完了！');
  } else {
    u.nextDate=addD(td(),INTS[u.step]);
    bumpStreak();
    save();
    // B1 fix: esc names in toast
    const msg=esc(STEPS[u.step-1])+'完了！次回: '+fmtShortText(u.nextDate);
    clearTimeout(_safetyTimer);
    if(u.nextDate>td()){
      setTimeout(()=>shrinkOut('w-'+id,()=>{ render(); _completing.delete(id); }),280);
    } else {
      setTimeout(()=>{ render(); _completing.delete(id); },320);
    }
    toast(IC.check, msg);
  }
}

/* ══ Fix5: Snooze picker ════════════════ */
let _snoozeId = null;
function openSnooze(id){
  const u=U.find(x=>x.id===id); if(!u) return;
  _snoozeId=id;
  document.getElementById('snooze-pick-ttl').textContent=`「${u.name}」を延期する`;
  const opts=document.getElementById('snooze-opts');
  const options=[
    {days:1, label:'明日に延期'},
    {days:2, label:'2日後に延期'},
    {days:3, label:'3日後に延期'},
    {days:7, label:'1週間後に延期'},
  ];
  opts.innerHTML=options.map(o=>{
    const dateStr=fmtShortText(addD(td(),o.days));
    // Fix6: unit name used only in snooze-pick-ttl via textContent (safe);
    // dateStr from our own fmtShortText is trusted HTML; no user input in innerHTML here
    return `<button class="snooze-opt" onclick="applySnooze(${o.days})">
      <span class="snooze-opt-lbl">${esc(o.label)}</span>
      <span class="snooze-opt-date">${dateStr}</span>
    </button>`;
  }).join('');
  document.getElementById('snooze-pick').classList.add('on');
  haptic();
}
function closeSnooze(){
  document.getElementById('snooze-pick').classList.remove('on');
  _snoozeId=null;
}
function applySnooze(days){
  if(!_snoozeId) return;                         // Bug3 fix: guard double-tap
  const id = _snoozeId;
  closeSnooze();                                 // clears _snoozeId immediately
  const u=U.find(x=>x.id===id); if(!u) return;
  u.nextDate=addD(td(),days); save();
  haptic('medium');
  shrinkOut('w-'+u.id,()=>render());
  const label=days===1?'明日':days===7?'1週間後':`${days}日後`;
  toast(IC.moon, esc(u.name)+`を${label}に延期しました`);
}

function snooze(id){ openSnooze(id); } // legacy alias

function del(id){
  if(openWrap && openWrap.dataset && openWrap.dataset.id===id){
    // Bug2 fix: snap card back before shrink so there's no transform glitch
    const card = openWrap.querySelector('.card');
    if(card){ card.style.transition='none'; card.style.transform=''; }
    openWrap._closeSwipe?.(); openWrap=null;
  }
  const idx=U.findIndex(x=>x.id===id); if(idx<0) return;
  const unit=U[idx];
  haptic();
  shrinkOut('w-'+id,()=>{
    U=U.filter(x=>x.id!==id); save(); render();
    showUndo(unit, idx, `「${unit.name}」を削除しました`);
  });
}

function shrinkOut(wid,cb){
  const el=document.getElementById(wid); if(!el){ cb(); return; }
  const h=el.offsetHeight;
  el.style.transition='none';
  el.style.maxHeight=h+'px'; el.style.overflow='hidden';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.style.transition='max-height .22s ease,opacity .16s,margin-bottom .22s';
    el.style.maxHeight='0'; el.style.opacity='0'; el.style.marginBottom='0';
  }));
  setTimeout(cb,250);
}

/* ══ Smart load balancer ═══════════════ */
function analyzeLoad(){
  const OVER=5, SHIFT=3, CAP=8;
  const t=td();
  const map={};
  U.filter(u=>!u.done && u.nextDate>t).forEach(u=>{ map[u.nextDate]=map[u.nextDate]||[]; map[u.nextDate].push(u.id); });
  const cnt={};
  const todayCount=U.filter(u=>!u.done && u.nextDate<=t).length;
  if(todayCount>0) cnt[t]=todayCount;
  Object.keys(map).forEach(d=>cnt[d]=map[d].length);
  const workMap={};
  Object.keys(map).forEach(d=>workMap[d]=[...map[d]]);
  const proposed=[];
  for(const fromDate of Object.keys(cnt).sort()){
    if((cnt[fromDate]||0)<OVER) continue;
    const cands=[];
    for(let delta=1;delta<=SHIFT;delta++){
      const before=addD(fromDate,-delta), after=addD(fromDate,delta);
      if(before>=t) cands.push({d:before,delta});
      cands.push({d:after,delta});
    }
    cands.sort((a,b)=>{ const ca=cnt[a.d]||0,cb=cnt[b.d]||0; return ca!==cb?ca-cb:a.delta-b.delta; });
    for(const id of [...(workMap[fromDate]||[])]){
      if((cnt[fromDate]||0)<OVER || proposed.length>=CAP) break;
      for(const {d:toDate} of cands){
        if((cnt[toDate]||0)>=OVER) continue;
        const u=U.find(x=>x.id===id); if(!u) continue;
        proposed.push({id,name:u.name,from:fromDate,to:toDate});
        cnt[fromDate]--; cnt[toDate]=(cnt[toDate]||0)+1;
        const idx=(workMap[fromDate]||[]).indexOf(id);
        if(idx>=0) workMap[fromDate].splice(idx,1);
        break;
      }
    }
  }
  return proposed;
}

function applySmartAdjust(moves){
  moves.forEach(({id,to})=>{ const u=U.find(x=>x.id===id); if(u) u.nextDate=to; });
  save();
  adjDismissed=true;
  try { localStorage.setItem(ADJ_DISMISSED_KEY,'1'); } catch(_){}
  render();
  toast(IC.check, moves.length+'件のタスクを分散しました');
  haptic('medium');
}

/* ══ P2: Undo delete ═══════════════════ */
let _undoStack = null; // { unit, idx }
let _undoTimer = null;
let _undoProgTimer = null;
const UNDO_SEC = 5;

function showUndo(unit, idx, msg){
  _undoStack={unit,idx};
  clearTimeout(_undoTimer); clearTimeout(_undoProgTimer);
  document.getElementById('undo-msg').textContent=msg;
  const bar=document.getElementById('undo-bar');
  const prog=document.getElementById('undo-prog');
  // Fix8: reset to 100% with no transition, then start countdown after bar is visible
  prog.style.transition='none'; prog.style.width='100%';
  bar.classList.add('on');
  // Small delay so user sees the bar appear at full before it starts counting down
  _undoProgTimer=setTimeout(()=>{
    prog.style.transition=`width ${UNDO_SEC}s linear`;
    prog.style.width='0%';
  }, 80);
  _undoTimer=setTimeout(()=>{ bar.classList.remove('on'); _undoStack=null; }, UNDO_SEC*1000+80);
}
function undoDelete(){
  if(!_undoStack) return;
  // Fix3: clear progress timer so it doesn't fire after undo
  clearTimeout(_undoTimer);
  clearTimeout(_undoProgTimer);
  const {unit}=_undoStack; _undoStack=null;
  if(unit.done){
    // Completed units go back to the done list (append)
    U.push(unit);
  } else {
    // Fix4: re-find insertion point by date proximity instead of stale idx
    const insertIdx = U.findIndex(u => !u.done && u.nextDate > unit.nextDate);
    if(insertIdx === -1) U.push(unit); else U.splice(insertIdx, 0, unit);
  }
  save();
  document.getElementById('undo-bar').classList.remove('on');
  render();
  toast(IC.checkCircle,'削除を取り消しました');
  haptic('medium');
}

/* ══ P5: Celebration ═══════════════════ */
function celebrate(name){
  const COLORS=['#3B82F6','#F59E0B','#10B981','#EF4444','#8B5CF6','#EC4899','#F97316'];
  for(let i=0;i<28;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.top='-10px';
    el.style.background=COLORS[Math.floor(Math.random()*COLORS.length)];
    const dur=1.2+Math.random()*1.6;
    const delay=Math.random()*.6;
    el.style.animationDuration=dur+'s';
    el.style.animationDelay=delay+'s';
    document.body.appendChild(el);
    // Fix5: primary cleanup via animationend; fallback timeout handles Safari edge cases
    el.addEventListener('animationend',()=>el.remove(),{once:true});
    setTimeout(()=>{ if(el.parentNode) el.remove(); },(dur+delay+0.5)*1000);
  }
  document.getElementById('celebrate-sub').textContent=`「${name}」の全${MAX_STEP}回復習完了！`;
  const box=document.getElementById('celebrate-box');
  box.classList.add('on');
  setTimeout(()=>box.classList.remove('on'),2400);
  haptic('heavy');
}


/* ══ Swipe gestures ════════════════════
   Today cards: left → delete, right → complete
   Upcoming cards: left → delete only (initSwipeDeleteOnly)
══════════════════════════════════════════ */
let openWrap=null;
function initSwipe(wrap){
  if(wrap._swipeInit) return;
  wrap._swipeInit=true;
  const card=wrap.querySelector('.card'); if(!card) return;
  let sx=0,sy=0,cx=0,live=false,dir=0;
  const MAX_L=-80, MAX_R=72;

  // Right-swipe complete overlay
  const completeOver=document.createElement('div');
  completeOver.style.cssText=
    'position:absolute;left:0;top:0;bottom:0;width:'+Math.abs(MAX_R)+'px;'+
    'background:#34C759;z-index:0;display:flex;flex-direction:column;'+
    'align-items:center;justify-content:center;gap:3px;pointer-events:none;'+
    'opacity:0;transition:opacity .15s';
  completeOver.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'+
    '<span style="color:#fff;font-size:11px;font-weight:600">完了</span>';
  wrap.insertBefore(completeOver, card);

  function closeSelf(){
    cx=0; dir=0;
    card.style.transition='transform .22s ease';
    card.style.transform='';
    completeOver.style.opacity='0';
  }
  wrap._closeSwipe=closeSelf;

  wrap.addEventListener('touchstart',e=>{
    if(openWrap&&openWrap!==wrap){ openWrap._closeSwipe?.(); openWrap=null; }
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; live=true; dir=0;
    card.style.transition='none';
  },{passive:true});

  wrap.addEventListener('touchmove',e=>{
    if(!live) return;
    const dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy;
    if(Math.abs(dy)>Math.abs(dx)+8){ live=false; return; }
    // Lock direction after first 4px to avoid accidental directional switch
    if(dir===0 && Math.abs(dx)>4) dir=dx>0?1:-1;
    if(dir===-1){
      if(dx>0&&cx>=0) return;
      cx=Math.max(MAX_L,Math.min(0,cx+dx));
      completeOver.style.opacity='0';
    } else if(dir===1){
      cx=Math.min(MAX_R,Math.max(0,cx+dx));
      completeOver.style.opacity=Math.min(1,cx/MAX_R)+'';
    } else return;
    card.style.transform=`translateX(${cx}px)`;
    sx=e.touches[0].clientX;
  },{passive:true});

  wrap.addEventListener('touchend',()=>{
    live=false;
    card.style.transition='transform .22s ease';
    if(dir===1){
      if(cx>=MAX_R*.6){
        // Complete triggered — animate out then complete
        card.style.transition='transform .18s ease,opacity .18s';
        card.style.transform=`translateX(${window.innerWidth}px)`;
        card.style.opacity='0';
        const id=wrap.dataset.id;
        setTimeout(()=>{ closeSelf(); complete(id); },200);
        openWrap=null; return;
      }
      closeSelf(); openWrap=null;
    } else {
      if(cx<MAX_L*.45){ cx=MAX_L; openWrap=wrap; haptic(); }
      else { cx=0; openWrap=null; }
      card.style.transform=cx?`translateX(${cx}px)`:'';
    }
  });
}
/* Left-swipe only (for upcoming cards — no complete action) */
function initSwipeDeleteOnly(wrap){
  if(wrap._swipeInit) return;
  wrap._swipeInit=true;
  const card=wrap.querySelector('.card'); if(!card) return;
  let sx=0,sy=0,cx=0,live=false,dir=0;
  const MAX_L=-80;

  function closeSelf(){
    cx=0; dir=0;
    card.style.transition='transform .22s ease';
    card.style.transform='';
  }
  wrap._closeSwipe=closeSelf;

  wrap.addEventListener('touchstart',e=>{
    if(openWrap&&openWrap!==wrap){ openWrap._closeSwipe?.(); openWrap=null; }
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; live=true; dir=0;
    card.style.transition='none';
  },{passive:true});

  wrap.addEventListener('touchmove',e=>{
    if(!live) return;
    const dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy;
    if(Math.abs(dy)>Math.abs(dx)+8){ live=false; return; }
    if(dir===0 && Math.abs(dx)>4) dir=dx>0?1:-1;
    if(dir!==-1) return; // only allow left swipe
    if(dx>0&&cx>=0) return;
    cx=Math.max(MAX_L,Math.min(0,cx+dx));
    card.style.transform=`translateX(${cx}px)`;
    sx=e.touches[0].clientX;
  },{passive:true});

  wrap.addEventListener('touchend',()=>{
    live=false;
    card.style.transition='transform .22s ease';
    if(dir!==-1){ cx=0; openWrap=null; card.style.transform=''; return; } // right swipe: snap back
    if(cx<MAX_L*.45){ cx=MAX_L; openWrap=wrap; haptic(); }
    else { cx=0; openWrap=null; }
    card.style.transform=cx?`translateX(${cx}px)`:'';
  });
}

document.addEventListener('touchstart',e=>{
  if(openWrap&&!openWrap.contains(e.target)){ openWrap._closeSwipe?.(); openWrap=null; }
},{passive:true});

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function render(){
  if(openWrap&&!document.contains(openWrap)) openWrap=null;
  saveScroll(); // B2 fix: preserve scroll before rebuilding innerHTML

  const t=td();
  const active=U.filter(u=>!u.done).sort((a,b)=>a.nextDate.localeCompare(b.nextDate));
  const todayL=active.filter(u=>u.nextDate<=t);
  const upL   =active.filter(u=>u.nextDate>t);
  const doneL =U.filter(u=>u.done).sort((a,b)=>(b.completedAt||0)-(a.completedAt||0));
  const over  =todayL.filter(u=>diff(u.nextDate)<0).length;

  const streak = getStreak();
  let chips='';
  if(over>0) chips+=`<div class="chip warn">${IC.alertSm} 超過 ${over}件</div>`;
  if(streak>0) chips+=`<div class="streak">🔥 ${streak}日連続</div>`;
  if(!chips) chips=`<div style="height:22px"></div>`;
  document.getElementById('stat-row').innerHTML=chips;

  const tb=document.getElementById('tbadge');
  if(todayL.length>0){ tb.textContent=todayL.length; tb.classList.remove('h'); }
  else tb.classList.add('h');

  rToday(todayL, active.length > 0);
  rUpcoming(upL);
  rDone(doneL);

  // Clear isNew flags after first render
  U.forEach(u=>delete u.isNew);

  document.querySelectorAll('#p-today .cw[data-id]').forEach(w=>initSwipe(w));
  restoreScroll(); // B2 fix: restore scroll after rebuild
}

/* ── Today panel ── */
function rToday(list, hasActive){
  const el=document.getElementById('p-today');
  if(!list.length){
    // Different state: tasks exist but all done today vs truly empty app
    if(hasActive){
      el.innerHTML=`
        <div class="hero all-done">
          <div class="hero-msg">今日はお疲れさまです！</div>

/* ── Done/Achievement panel ── */
function rDone(doneList){
  const el=document.getElementById('p-done');

  // All units (active + done) for the achievement view
  const allActive = U.filter(u=>!u.done).sort((a,b)=>a.addedDate.localeCompare(b.addedDate));
  const totalUnits = allActive.length + doneList.length;

  if(totalUnits === 0){
    el.innerHTML=`<div class="empty">
      <div class="empty-icon" style="background:#D1FAE5">${IC.trophy}</div>
      <h3>まだ単元がありません</h3>
      <p>＋ボタンから単元を追加すると<br>ここに実績が表示されます</p>
    </div>`; return;
  }

  // Hero stats
  const totalSteps   = allActive.reduce((s,u)=>s+u.step,0) + doneList.length * MAX_STEP;
  const maxSteps     = totalUnits * MAX_STEP;
  const overallPct   = maxSteps > 0 ? Math.round(totalSteps / maxSteps * 100) : 0;

  // SVG ring (circumference = 2π×26 ≈ 163.4)
  const R=26, C=2*Math.PI*R;
  const dash=C*(overallPct/100), gap=C-dash;
  const ringHtml=`<svg width="64" height="64" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="${R}" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="6"/>
    <circle cx="32" cy="32" r="${R}" fill="none" stroke="#fff" stroke-width="6"
      stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}"
      stroke-linecap="round"/>
  </svg>`;

  let html=`<div class="achiev-hero">
    <div class="achiev-hero-row">
      <div class="achiev-hero-eyebrow">実績 · ACHIEVEMENT</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="achiev-stats">
        <div class="achiev-stat">
          <div class="achiev-stat-num">${totalUnits}</div>
          <div class="achiev-stat-lbl">登録単元</div>
        </div>
        <div class="achiev-stat">
          <div class="achiev-stat-num">${allActive.length}</div>
          <div class="achiev-stat-lbl">進行中</div>
        </div>
        <div class="achiev-stat">
          <div class="achiev-stat-num">${doneList.length}</div>
          <div class="achiev-stat-lbl">全完了</div>
        </div>
      </div>
      <div class="achiev-ring-wrap">
        ${ringHtml}
        <div class="achiev-ring-pct">${overallPct}%</div>
      </div>
    </div>
  </div>`;

  // ── In-progress units ──
  if(allActive.length){
    html+=`<div class="sec sec-first">進行中（${allActive.length}）</div>`;
    html+=allActive.map(u=>{
      const pct=Math.round(u.step/MAX_STEP*100);
      const nextInfo = u.nextDate<=td()
        ? `<span style="color:var(--red);font-weight:600">${IC.alertSm} 復習待ち</span>`
        : `${IC.calendar} 次回: ${fmtShort(u.nextDate)}`;
      // Colour ring per progress level
      const ringCol = pct===0?'#CBD5E1':pct<50?'#60A5FA':pct<75?'#3B82F6':'#1D4ED8';
      const stepDotsHtml = STEPS.map((_,i)=>{
        const cls=i<u.step?'done':i===u.step?'active':'';
        return `<span class="step-dot ${cls}"></span>`;
      }).join('');
      return `<div class="prog-card" id="w-${u.id}">
        <div class="prog-card-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${ringCol}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </div>
        <div class="prog-card-body">
          <div class="prog-card-name">${esc(u.name)}</div>
          <div class="prog-card-meta">${nextInfo}</div>
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:6px">
            <div class="step-dots" style="margin-bottom:0;flex-wrap:wrap">${stepDotsHtml}</div>
            <span style="font-size:11px;color:var(--lbl3);margin-left:2px;white-space:nowrap">${STEPS[u.step]}</span>
          </div>
          <div class="prog-bar-wrap">
            <div class="prog-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="prog-card-pct">${pct}%</div>
      </div>`;
    }).join('');
  }

  // ── Fully completed units ──
  if(doneList.length){
    html+=`<div class="sec${allActive.length?'':' sec-first'}">全復習完了 🎉（${doneList.length}）</div>`;
    html+=doneList.map(u=>`
      <div class="done-row" id="w-${u.id}">
        <div class="done-icon">${IC.checkGreen}</div>
        <div class="done-txt">
          <div class="done-name">${esc(u.name)}</div>
          <div class="done-meta">${IC.calendar} ${fmtFull(u.addedDate)}　全${MAX_STEP}回完了</div>
        </div>
        <button class="done-del" onclick="del('${u.id}')" aria-label="削除">${IC.trash}</button>
      </div>`).join('');
  }

  el.innerHTML=html;
}

function bindSearch(el){
  const inp=el.querySelector('#search-inp'); if(!inp) return;
  // Restore cursor after re-render, but skip if another element has focus (e.g. IME in progress)
  if(searchQ && document.activeElement !== document.body){
    // Only restore focus if the search input was previously focused
    // Use a microtask so any pending compositionend has already fired
    Promise.resolve().then(()=>{
      if(!document.querySelector('#search-inp')) return; // panel may have changed
      inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length);
    });
  }
  inp.addEventListener('input',e=>{
    if(e.isComposing) return; // skip mid-IME to avoid interrupting Japanese input
    searchQ=e.target.value; render();
  });
  inp.addEventListener('compositionend',e=>{
    searchQ=e.target.value; render();
  });
  inp.addEventListener('search',e=>{ searchQ=e.target.value; render(); });
  const clr=el.querySelector('#search-clear');
  if(clr) clr.addEventListener('click',()=>{
    searchQ=''; render();
    setTimeout(()=>document.querySelector('#search-inp')?.focus(),50);
  });
}

/* ══ Tab switch ════════════════════════ */
let currentTabIdx=0;
function switchTab(btn){
  const id=btn.dataset.tab, newIdx=parseInt(btn.dataset.idx);
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('on',b===btn));

  // B6 fix: clean state-based panel visibility, no static opacity/transform on .panel
  document.querySelectorAll('.panel').forEach(p=>{
    const isTarget = p.id==='p-'+id;
    p.classList.remove('slide-in','slide-back','visible');
    if(isTarget){
      // Fix2: clear stale inline display:none so CSS animation class can take effect
      p.style.display='';
      void p.offsetWidth;
      p.classList.add(newIdx>=currentTabIdx?'slide-in':'slide-back');
      // Fix8: fallback timeout in case animationend doesn't fire (Safari background tab)
      let _ended=false;
      const onEnd=()=>{
        if(_ended) return; _ended=true;
        p.classList.remove('slide-in','slide-back');
        p.classList.add('visible');
        p.removeEventListener('animationend',onEnd);
      };
      p.addEventListener('animationend',onEnd);
      setTimeout(onEnd, 400); // fallback: .22s anim + buffer
    } else {
      p.style.display='none';
    }
  });

  document.getElementById('nav-title').textContent=TABS[id];
  currentTabIdx=newIdx;
  activeTagFilter=null; // reset tag filter on tab switch

  // Bug4 fix: clear search state when leaving upcoming tab; re-render only upcoming panel
  if(id!=='upcoming' && searchQ){
    searchQ='';
    const upL=U.filter(u=>!u.done&&u.nextDate>td()).sort((a,b)=>a.nextDate.localeCompare(b.nextDate));
    rUpcoming(upL);
  }
}

let _tt;

/* ══ Backup / Export / Import ══════════════════════════════════════
   Keys:
     fukushu-backup-last   → ISO date string of last export
     fukushu-backup-reminded → today's date, to show reminder once per day
════════════════════════════════════════════════════════════════════ */
const BACKUP_LAST_KEY      = 'fukushu-backup-last';
const BACKUP_REMINDED_KEY  = 'fukushu-backup-reminded';
const BACKUP_REMIND_DAYS   = 3;

function getLastBackupDate(){
  try { return localStorage.getItem(BACKUP_LAST_KEY) || null; } catch { return null; }
}
function setLastBackupDate(){
  try { localStorage.setItem(BACKUP_LAST_KEY, new Date().toISOString()); } catch {}
}
function daysSinceBackup(){
  const last = getLastBackupDate();
  if(!last) return Infinity;
  return Math.floor((Date.now() - new Date(last).getTime()) / 86400000);
}

function checkBackupReminder(){
  try {
    const reminded = localStorage.getItem(BACKUP_REMINDED_KEY);
    if(reminded === td()) return;
    const days = daysSinceBackup();
    if(days < BACKUP_REMIND_DAYS) return;
    localStorage.setItem(BACKUP_REMINDED_KEY, td());
    showBackupReminder(days);
  } catch {}
}

function showBackupReminder(days){
  const daysText = days === Infinity ? 'まだバックアップしていません' : `最後のバックアップから ${days} 日経過しています`;
  const banner = document.createElement('div');
  banner.className = 'backup-reminder';
  banner.id = 'backup-reminder-banner';
  banner.innerHTML = `
    <div class="backup-reminder-icon">💾</div>
    <div class="backup-reminder-body">
      <div class="backup-reminder-ttl">バックアップを推奨します</div>
      <div class="backup-reminder-sub">${daysText}。タップしてデータを保存しませんか？</div>
    </div>
    <button class="backup-reminder-close" onclick="dismissBackupReminder(event)" aria-label="閉じる">✕</button>
  `;
  banner.addEventListener('click', e => {
    if(e.target.closest('.backup-reminder-close')) return;
    dismissBackupReminder(e);
    openBackupSheet();
  });
  const panel = document.querySelector('.panel.visible');
  if(panel) panel.prepend(banner);
}

function dismissBackupReminder(e){
  if(e) e.stopPropagation();
  const el = document.getElementById('backup-reminder-banner');
  if(el){ el.style.opacity='0'; el.style.transition='opacity .2s'; setTimeout(()=>el.remove(), 200); }
}

function openBackupSheet(){
  updateBackupLastText();
  document.getElementById('backup-overlay').classList.add('on');
  document.getElementById('backup-sheet').classList.add('on');
  haptic();
}
function closeBackupSheet(){
  document.getElementById('backup-overlay').classList.remove('on');
  document.getElementById('backup-sheet').classList.remove('on');
}
function updateBackupLastText(){
  const last = getLastBackupDate();
  const el = document.getElementById('backup-last-text');
  if(!el) return;
  if(!last){
    el.textContent = 'まだバックアップが行われていません';
  } else {
    const d = new Date(last);
    const fmt = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    const days = daysSinceBackup();
    const ago = days === 0 ? '今日' : `${days}日前`;
    el.textContent = `最終バックアップ：${fmt}（${ago}）`;
  }
}

function doExport(){
  try {
    const payload = {
      version: 1,
      exportedAt: new Date().toISOString(),
      units: U,
      tags: TAGS,
      streak: JSON.parse(localStorage.getItem('fukushu-streak-v1') || 'null'),
    };
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], {type: 'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `fukushu-backup-${td().replace(/-/g,'')}.json`;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 500);
    setLastBackupDate();
    updateBackupLastText();
    const banner = document.getElementById('backup-reminder-banner');
    if(banner) banner.remove();
    toast(IC.checkCircle, 'バックアップを保存しました');
    haptic('medium');
  } catch { toast(IC.alert, 'エクスポートに失敗しました'); }
}

let _importPending = null;

function triggerImport(){
  document.getElementById('import-file-input').value = '';
  document.getElementById('import-file-input').click();
}

function handleImportFile(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if(!data.units || !Array.isArray(data.units)) throw new Error('invalid');
      _importPending = data;
      const sub = document.getElementById('import-confirm-sub');
      if(sub) sub.textContent = `${data.units.length} 件の単元、${(data.tags||[]).length} 件のタグを読み込みます。現在のデータはすべて上書きされます。この操作は取り消せません。`;
      document.getElementById('import-confirm').classList.add('on');
      haptic();
    } catch { toast(IC.alert, '読み込めないファイルです'); }
  };
  reader.readAsText(file);
}

function cancelImport(){
  _importPending = null;
  document.getElementById('import-confirm').classList.remove('on');
}

function confirmImport(){
  if(!_importPending) return;
  try {
    U = _importPending.units;
    TAGS = _importPending.tags || [];
    save(); saveTags();
    if(_importPending.streak) localStorage.setItem('fukushu-streak-v1', JSON.stringify(_importPending.streak));
    _importPending = null;
    document.getElementById('import-confirm').classList.remove('on');
    closeBackupSheet();
    render();
    renderSheetTagSel();  // Bug4: refresh tag selectors with new TAGS
    renderEditTagSel();
    toast(IC.checkCircle, `${U.length} 件のデータを復元しました`);
    haptic('heavy');
  } catch { toast(IC.alert, 'インポートに失敗しました'); }
}

/* ══ Init ══════════════════════════════ */
(function init(){
  // PWA standalone detection
  const isPWA = navigator.standalone === true;
  if(isPWA) document.body.classList.add('pwa');

  // Safe-area compensation.
  // env(safe-area-inset-*) returns 0px in this PWA build due to meta/manifest config.
  // We compute insets from screen vs viewport measurements directly.
  if(isPWA){
    const screenH = screen.height;
    const innerH  = window.innerHeight;
    const screenDiff = screenH - innerH;   // renamed: avoid collision with global diff()

    const topInset    = screenDiff > 0 ? screenDiff : 47;
    const bottomInset = 34;

    document.documentElement.style.setProperty('--safe-top',    topInset    + 'px');
    document.documentElement.style.setProperty('--safe-bottom', bottomInset + 'px');
  }

  const d=new Date();
  document.getElementById('nav-date').textContent=
    `${d.getMonth()+1}/${d.getDate()}（${DOW[d.getDay()]}）`;
  document.getElementById('inp').addEventListener('keydown',e=>{ if(e.key==='Enter') addUnit(); });
  document.getElementById('date-inp').addEventListener('change',updateSheetInfo);
  render();
  renderSheetTagSel();
  setTimeout(checkBackupReminder, 800); // slight delay so UI is settled
})();

if('serviceWorker' in navigator){
  const sw=`const C='fk-v22';
self.addEventListener('install',()=>self.skipWaiting());
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));return self.clients.claim();});
self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.open(C).then(c=>c.match(e.request).then(r=>{const n=fetch(e.request).then(rs=>{c.put(e.request,rs.clone());return rs;}).catch(()=>r);return r||n;})));});`;
  try{navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});}catch(_){}
}

<!-- Import file picker (hidden) -->
